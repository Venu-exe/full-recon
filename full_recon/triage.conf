# ============================================================
# Triage Configuration File
# Place this in the same directory as triage_enhanced.sh
# It will be automatically loaded
# ============================================================

# Directory containing gf results
GF_RESULTS_DIR="gf_results"

# File containing URLs with parameters
URLS_FILE="urls/with_params.txt"

# Noise filtering regex
# These params are skipped (analytics, tracking, etc.)
NOISE_REGEX='^(af_|utm_|_c$|_ff$|_l$|_l10n$|_lrmc$|_plk$|_style$|_thumbnail_id$|_density$|cid$|ec$|ev$|ds$|v$|ver$|t$|tl$|hl$|pid$|pn$|pg$|mode$|format$|display$|key$|token$|campaign$|medium$|source$|srsltid$)'

# ============================================================
# PARAMETER LISTS - Customize these for your targets
# ============================================================

# Open redirect parameters
# Common params that redirect users to external URLs
REDIRECT_PARAMS="url new_url redirect_uri returnurl refURL linkurl share_url startURL canonicalUrl redirect return next dest continue target forward ref continue_url callback_url goto previous return_to return_url target_url"

# Text reflection parameters (XSS candidates)
# Common params that echo user input in responses
TEXT_PARAMS="q search keyword name text title address city comment message feedback review query subject content body description bio profile username tag tags category filter sort order subject email phone location note memo caption label"

# IDOR parameters (ID candidates)
# Common ID-style params that might lack access control
IDOR_PARAMS="hotel_id bookingId activityId cityId site_id siteId tierId id ID user_id account_id order_id booking_id reservation_id invoice_id product_id item_id listing_id post_id article_id document_id report_id transaction_id payment_id shipment_id tracking_id"

# ============================================================
# Add custom parameters here for specific targets
# ============================================================

# Example for travel/booking sites:
# IDOR_PARAMS="$IDOR_PARAMS hotel_id flight_id room_id guest_id reservation_id"

# Example for e-commerce:
